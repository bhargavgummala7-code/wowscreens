<!DOCTYPE html>
<html>
<head>
  <title>Book Your Surprise - Wowscreen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin:0; background:#0f172a; color:white; text-align:center; }
    .section { padding:40px 20px; }
    select, input {
      padding:10px;
      margin:10px;
      border-radius:6px;
      border:none;
      width:80%;
    }
    .btn {
      padding:14px 28px;
      background:#e11d48;
      color:white;
      border:none;
      border-radius:8px;
      margin-top:20px;
    }
    .card {
      background:#1e293b;
      padding:15px;
      margin:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<div class="section">
  <h1>Book Your Surprise 🎬</h1>
  <p>Select theatre, date & show timing</p>

  <!-- THEATRE -->
  <select>
    <option>Select Theatre</option>
    <option>PVR Cinemas</option>
    <option>INOX</option>
    <option>Local Theatre</option>
  </select>

  <!-- LOCATION -->
  <select>
    <option>Select Location</option>
    <option>Hyderabad</option>
    <option>Vijayawada</option>
    <option>Visakhapatnam</option>
  </select>

  <!-- DATE -->
  <input type="date">

  <!-- SHOW TIME -->
  <select>
    <option>Select Show Timing</option>
    <option>Morning Show</option>
    <option>Matinee</option>
    <option>Evening</option>
    <option>Night Show</option>
  </select>

</div>

<!-- TEMPLATE SELECTION -->
<div class="section">
  <h2>Select Your Template 🎥</h2>

  <div class="card">❤️ Romantic Proposal</div>
  <div class="card">🎂 Birthday Wish</div>
  <div class="card">🎉 Anniversary</div>
  <div class="card">📢 Promotion Ad</div>

</div>

<!-- FINAL CTA -->
<div class="section">
  <button class="btn">Continue Booking</button>
</div>

</body>
</html>
